<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Retro Barclays Premier League Style</title>

  <style>
    /* === CORE BARCLAYS ERA COLORS ===
       Deep Navy: #0B1D51
       Royal Blue: #003A8F
       White: #FFFFFF
       Red Accent (ball): #E2231A
    */

    body {
      margin: 0;
      font-family: 'Courier New', monospace;
      background: #0B1D51;
      color: #FFFFFF;
      image-rendering: pixelated;
    }

    /* CRT scanline overlay */
    body::after {
      content: "";
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: repeating-linear-gradient(
        to bottom,
        rgba(255,255,255,0.05),
        rgba(255,255,255,0.05) 1px,
        transparent 1px,
        transparent 3px
      );
      pointer-events: none;
    }

    header {
      background: #003A8F;
      border-bottom: 6px solid #E2231A;
      text-align: center;
      padding: 20px;
      box-shadow: inset 0 0 0 4px #FFFFFF;
    }

    header h1 {
      margin: 0;
      font-size: 2.5rem;
      text-transform: uppercase;
      letter-spacing: 4px;
    }

    nav {
      background: #FFFFFF;
      display: flex;
      justify-content: center;
      gap: 15px;
      padding: 10px;
      border-bottom: 4px solid #003A8F;
    }

    nav a {
      color: #003A8F;
      text-decoration: none;
      font-weight: bold;
      padding: 8px 14px;
      border: 3px solid #003A8F;
      background: #FFFFFF;
      box-shadow: 3px 3px 0 #0B1D51;
    }

    nav a:hover {
      background: #E2231A;
      color: #FFFFFF;
      border-color: #E2231A;
    }

    .container {
      display: grid;
      grid-template-columns: 260px 1fr;
      gap: 20px;
      padding: 20px;
    }

    @media (max-width: 768px) {
      .container {
        grid-template-columns: 1fr;
      }
    }

    .sidebar {
      background: #003A8F;
      border: 4px solid #FFFFFF;
      padding: 15px;
      box-shadow: 6px 6px 0 #000;
    }

    .main {
      background: #FFFFFF;
      color: #0B1D51;
      border: 6px solid #003A8F;
      padding: 20px;
      box-shadow: 8px 8px 0 #000;
    }

    .card {
      background: #003A8F;
      color: #FFFFFF;
      border: 4px solid #E2231A;
      padding: 15px;
      margin-bottom: 15px;
      box-shadow: 5px 5px 0 #0B1D51;
    }

    .pixel-box {
      width: 100%;
      height: 140px;
      background: repeating-linear-gradient(
        90deg,
        #003A8F,
        #003A8F 8px,
        #FFFFFF 8px,
        #FFFFFF 16px
      );
      border: 3px solid #E2231A;
      margin-bottom: 15px;
    }

    h2, h3 {
      text-transform: uppercase;
      letter-spacing: 2px;
    }

    footer {
      background: #003A8F;
      color: #FFFFFF;
      text-align: center;
      padding: 15px;
      border-top: 6px solid #E2231A;
      margin-top: 20px;
    }
  </style>
</head>
<body>

  <header>
    <h1>Barclays League</h1>
    <p>1990s • Pixel • Football</p>
  </header>

  <nav>
    <a href="#">Home</a>
    <a href="#">Teams</a>
    <a href="#">Fixtures</a>
    <a href="#">Table</a>
  </nav>

  <div class="container">

    <aside class="sidebar">
      <h3>Menu</h3>
      <div class="pixel-box"></div>
      <p>[Filters / Clubs / Seasons]</p>
    </aside>

    <main class="main">
      <h2>Main Panel</h2>

      <div class="card">
        <h3>Featured Match</h3>
        <p>[Match details / score]</p>
      </div>

      <div class="card">
        <h3>League Table</h3>
        <p>[Standings placeholder]</p>
      </div>

      <div class="pixel-box"></div>

      <p>[More retro content blocks]</p>
    </main>

  </div>

  <footer>
    <p>© Retro Barclays Era UI</p>
  </footer>

  <script>
    (function () {
      'use strict';

      console.log('Retro Barclays theme loaded');

      // TEST CASES
      function runTests() {
        console.assert(getComputedStyle(document.body).backgroundColor !== '', 'Body should have background');
        console.assert(document.querySelectorAll('.card').length >= 2, 'Cards should exist');
        console.assert(document.querySelector('nav') !== null, 'Nav should exist');
      }

      runTests();
    })();
  </script>

</body>
</html>
